name: weekly-compliance
on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday at 5 AM UTC
  workflow_dispatch: {}

jobs:
  compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2

      - name: Install mixedGM (needed for cross-package tests)
        run: Rscript -e 'remotes::install_github("MaartenMarsman/mixedGM")'

      - name: Generate compliance fixtures (if missing)
        run: |
          if [ ! -f dev/fixtures/compliance/manifest.rds ]; then
            Rscript dev/bitwise_compliance/generate_fixtures.R || true
          fi

      - name: Run bitwise compliance (OMRF configs only)
        run: Rscript dev/bitwise_compliance/test_compliance.R

      - name: Run cross-package validation
        run: Rscript dev/tests/validation/group4_cross_package.R

      - name: Run performance profiling
        run: Rscript dev/tests/validation/group9_profiling.R
