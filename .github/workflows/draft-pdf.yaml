on:
  push:
    branches:
      - joss-paper
    paths:
      - paper/**
  pull_request:
    paths:
      - paper/**

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Draft PDF
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper/paper.md
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper/paper.pdf
